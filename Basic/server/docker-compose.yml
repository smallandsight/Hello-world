# ============================================================
# 古月租车 - Docker Compose 开发环境
# 
# 使用方式：
#   开发环境：docker compose up -d          (启动全部服务)
#   仅后端：  docker compose up -d server     (仅启动API+MySQL+Redis)
#   查看日志：docker compose logs -f server
#   停止：    docker compose down -v           (停止并清除数据)
# ============================================================

version: '3.8'

services:
  # ==================== MySQL 8.0 ====================
  mysql:
    image: mysql:8.0
    container_name: gy-bike-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: gybike_root_2024
      MYSQL_DATABASE: gy_bike
      MYSQL_USER: gybike_user
      MYSQL_PASSWORD: gybike_dev_2024
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./migrations/init-schema.sql:/docker-entrypoint-initdb.d/01-init-schema.sql:ro
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --max_connections=200
      - --innodb-buffer-pool-size=256M
      - --slow-query-log=1
      - --long_query_time=2
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-ugybike_user", "-pgybike_dev_2024"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gy-bike-network

  # ==================== Redis 7 ====================
  redis:
    image: redis:7-alpine
    container_name: gy-bike-redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - gy-bike-network

  # ==================== NestJS API Server ====================
  server:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: gy-bike-server
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: development
      APP_PORT: 3000
      API_PREFIX: /v1

      # 数据库（使用Docker服务名作为host）
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USERNAME: gybike_user
      DB_PASSWORD: gybike_dev_2024
      DB_DATABASE: gy_bike
      DB_SYNCHRONIZE: false
      DB_LOGGING: true

      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379

      # JWT
      JWT_SECRET: dev-jwt-secret-change-in-production-min-32-chars
      JWT_USER_EXPIRES_IN: 7d
      JWT_STAFF_EXPIRES_IN: 2d

      # 日志
      LOG_LEVEL: debug

      # CORS
      CORS_ORIGINS: *
    ports:
      - "3000:3000"
    volumes:
      # 开发时源代码热重载
      - .:/app
      - server_node_modules:/app/node_modules
      - ./logs:/app/logs
    networks:
      - gy-bike-network

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
  server_node_modules:
    driver: local

networks:
  gy-bike-network:
    driver: bridge
