# ============================================================
# 古月租车 - GitHub Actions CI/CD 流水线
#
# 触发条件：
#   - push 到 main 分支（部署生产环境）
#   - push 到 develop 分支（部署测试环境）
#   - PR 到 main/develop（仅运行测试）
# ============================================================

name: GyBike CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '20'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ==================== 代码质量检查 ====================
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Type Check (tsc --noEmit)
        run: npx tsc --noEmit

  # ==================== 单元测试 + 覆盖率 ====================
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: test_root
          MYSQL_DATABASE: gy_bike_test
          MYSQL_USER: test_user
          MYSQL_PASSWORD: test_pass
          TZ: Asia/Shanghai
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # 等待数据库就绪后初始化表结构
      - name: Init Test Database
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
        run: |
          mysql -h127.0.0.1 -utest_user -ptestpass gy_bike_test < migrations/init-schema.sql || true

      - name: Run Unit Tests with Coverage
        env:
          NODE_ENV: test
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_USERNAME: test_user
          DB_PASSWORD: test_pass
          DB_DATABASE: gy_bike_test
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: 6379
          JWT_SECRET: test-secret-for-ci
        run: npm run test:cov

      - name: Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

      # 检查覆盖率阈值（可按需调整）
      - name: Check Coverage Thresholds
        if: always()
        run: |
          echo "检查测试覆盖率..."
          COVERAGE=$(cat coverage/coverage-summary.json | jq '.total.lines.pct' || echo "0")
          echo "当前行覆盖率: ${COVERAGE}%"
          if [ "$COVERAGE" -lt 50 ]; then
            echo "::warning::行覆盖率低于50%，请补充测试用例"
          fi

  # ==================== 构建镜像 ====================
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          target: production
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ==================== 部署到测试环境 ====================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/develop'
    environment: staging
    steps:
      - name: Deploy Notification
        run: |
          echo "🚀 部署到测试环境..."
          echo "镜像标签: ${{ needs.build.outputs.image_tag }}"
          # 这里替换为实际的部署命令，如：
          # ssh user@staging-server "cd /opt/gy-bike && docker compose pull && docker compose up -d"

  # ==================== 部署到生产环境 ====================
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - name: Deploy Notification
        run: |
          echo "🚀 部署到生产环境..."
          echo "镜像标签: ${{ needs.build.outputs.image_tag }}"
          # 生产部署通常需要手动审批或额外验证

  # ==================== 安全扫描 ====================
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck]
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
        continue-on-error: true

      - name: Upload Trivy Results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
